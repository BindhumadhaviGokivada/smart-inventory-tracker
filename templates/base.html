<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ app_full_name }} ({{ app_name }}): CSV inventory, analytics, and stock forecasts.">
    <title>{% block title %}{{ app_name }}{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;600&display=swap" rel="stylesheet">
    {% block head_extra %}{% endblock %}
</head>
<body>
    <a href="#main" class="skip-link">Skip to content</a>
    <header class="site-header">
        <div class="site-header__inner">
            <a href="/" class="site-brand" aria-label="{{ app_full_name }}, home">
                <span class="site-brand__mark">{{ app_name }}</span>
                <span class="site-brand__full">{{ app_full_name }}</span>
            </a>
            <nav class="site-nav" aria-label="Main">
                <ul>
                    <li><a href="/" {% if nav_active == 'home' %}class="is-active" aria-current="page"{% endif %}>Home</a></li>
                    <li><a href="/inventory" {% if nav_active == 'inventory' %}class="is-active" aria-current="page"{% endif %}>Inventory</a></li>
                    <li><a href="/analytics" {% if nav_active == 'analytics' %}class="is-active" aria-current="page"{% endif %}>Analytics</a></li>
                    <li><a href="/predict" {% if nav_active == 'predict' %}class="is-active" aria-current="page"{% endif %}>Forecast</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main id="main" class="main">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="site-footer__inner">
            <p><strong>{{ app_name }}</strong>: {{ app_full_name }}</p>
            <p class="site-footer__tag">CSV in, clarity out.</p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/app.js') }}" defer></script>
    {% block scripts_extra %}{% endblock %}
</body>
</html>
